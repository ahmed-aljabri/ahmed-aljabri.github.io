    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['DM Sans', 'system-ui', '-apple-system', 'sans-serif'],
            serif: ['Georgia', 'Cambria', 'serif'],
            mono: ['ui-monospace', 'SFMono-Regular', 'SF Mono', 'Cascadia Code', 'Consolas', 'monospace'],
          },
          colors: {
            link:    'var(--color-link)',
            surface: 'var(--color-surface)',
            accent:  'var(--color-accent)',
          },
          typography: ({ theme }) => ({
            DEFAULT: {
              css: {
                '--tw-prose-body':        'var(--color-text)',
                '--tw-prose-headings':    'var(--color-text)',
                '--tw-prose-links':       'var(--color-link)',
                '--tw-prose-bold':        'var(--color-text)',
                '--tw-prose-counters':    'var(--color-secondary)',
                '--tw-prose-bullets':     'var(--color-secondary)',
                '--tw-prose-hr':          'var(--color-border)',
                '--tw-prose-quotes':      'var(--color-bq-text)',
                '--tw-prose-quote-borders': 'var(--color-accent)',
                '--tw-prose-captions':    'var(--color-secondary)',
                '--tw-prose-code':        'var(--color-text)',
                '--tw-prose-pre-code':    'var(--color-text)',
                '--tw-prose-pre-bg':      'var(--color-surface)',
                '--tw-prose-th-borders':  'var(--color-border)',
                '--tw-prose-td-borders':  'var(--color-border)',
                a: {
                  color: 'var(--color-link)',
                  fontWeight: 'inherit',
                  textDecoration: 'underline dotted',
                  textDecorationColor: 'var(--color-link-ul)',
                  textUnderlineOffset: '2px',
                },
                'a:hover': {
                  textDecorationStyle: 'solid',
                  textDecorationColor: 'var(--color-link)',
                },
                'code::before': { content: '""' },
                'code::after':  { content: '""' },
              },
            },
          }),
        },
      },
      plugins: [tailwind.plugin(function({ addBase, addComponents, theme }) {})],

  <link rel="stylesheet" id="hljs-light" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" />
  <link rel="stylesheet" id="hljs-dark"  href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" disabled />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <style>
     
    @font-face {
      font-family: 'DM Sans';
      src: url('/fonts/DMSans.ttf') format('truetype');
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'DM Sans';
      src: url('/fonts/DMSans-Italic.ttf') format('truetype');
      font-weight: 100 900;
      font-style: italic;
      font-display: swap;
    }

     
    :root {
      --color-bg:          #fffffc;
      --color-surface:     #f6f8fa;
      --color-surface-alt: #f3f4f6;
      --color-nav-bg:      #f8faf8;
      --color-text:        #000000;
      --color-secondary:   #555555;
      --color-muted:       #777777;
      --color-link:        #b85c38;
      --color-link-ul:     #b85c3855;
      --color-border:      #e5e7eb;
      --color-border-nav:  #e0e2e0;
      --color-accent:      #b85c38;
      --color-bq-text:     #4a4a4a;
      --color-prompt:      #b85c38;
    }
    .dark {
      --color-bg:          #0d1117;
      --color-surface:     #161b22;
      --color-surface-alt: #1c2128;
      --color-nav-bg:      #0d1117;
      --color-text:        #e6edf3;
      --color-secondary:   #8b949e;
      --color-muted:       #6e7681;
      --color-link:        #c9784e;
      --color-link-ul:     #c9784e55;
      --color-border:      #30363d;
      --color-border-nav:  #21262d;
      --color-accent:      #c9784e;
      --color-bq-text:     #b1bac4;
      --color-prompt:      #c9784e;
    }

     
    html { scroll-behavior: smooth; }
    body {
      background-color: var(--color-bg);
      color: var(--color-text);
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

     
    a {
      color: var(--color-link);
      text-decoration: underline dotted;
      text-decoration-color: var(--color-link-ul);
      text-underline-offset: 2px;
      transition: text-decoration-color 0.15s;
    }
    a:hover {
      text-decoration-style: solid;
      text-decoration-color: var(--color-link);
    }
    a.no-underline, a.no-underline:hover { text-decoration: none; }

     
    :not(pre) > code {
      font-family: ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, monospace;
      font-size: 0.82em;
      background: var(--color-surface-alt);
      padding: 0.15em 0.4em;
      border-radius: 3px;
      border: 1px solid var(--color-border);
    }
    pre {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      padding: 1rem;
      overflow-x: auto;
      font-size: 0.82rem;
      line-height: 1.55;
    }
    pre code { background: none; border: none; padding: 0; font-size: inherit; }
    pre code.hljs { padding: 0 !important; background: none !important; }

     
    blockquote {
      position: relative;
      border-left: 3px solid var(--color-accent);
      padding: 0.5rem 1rem;
      margin-left: 0;
      color: var(--color-bq-text);
      font-style: italic;
    }

    blockquote p { margin: 0; }

     
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    th, td { border: 1px solid var(--color-border); padding: 0.5rem 0.75rem; text-align: left; }
    th { background: var(--color-surface); font-weight: 600; }
    tr:nth-child(even) td { background: var(--color-surface); }

     
    figcaption {
      font-style: italic;
      font-size: 0.8rem;
      color: var(--color-secondary);
      margin-top: 0.35rem;
      line-height: 1.4;
      text-align: center;
    }

     
    hr { border: none; border-top: 1px solid var(--color-border); margin: 2rem 0; }

     
    .term-cursor {
      display: inline-block;
      width: 8px;
      height: 1em;
      background: var(--color-prompt);
      vertical-align: middle;
      margin-left: 1px;
      border-radius: 1px;
      animation: blink 1.1s step-start infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

     
    #site-header {
      background-color: var(--color-nav-bg);
      border-bottom: 1px solid var(--color-border-nav);
      overflow: visible;
    }
    .nav-prompt {
      font-family: ui-monospace, 'SF Mono', Consolas, monospace;
      color: var(--color-prompt);
      font-weight: 700;
      letter-spacing: -0.02em;
      user-select: none;
    }
    .nav-link {
      color: var(--color-secondary);
      text-decoration: none;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      font-size: 0.875rem;
      transition: color 0.15s, background 0.15s;
    }
    .nav-link:hover, .nav-link.active {
      color: var(--color-link);
      background: var(--color-surface);
      text-decoration: none;
    }
    .nav-link.active { font-weight: 600; }
    @media (min-width: 640px) {
      .nav-link { position: relative; }
      .nav-link.active::after {
        content: '';
        position: absolute;
        bottom: -9px;
        left: 50%;
        transform: translateX(-50%);
        border-left: 4px solid transparent;
        border-right: 4px solid transparent;
        border-top: 5px solid var(--color-prompt);
      }
    }
    .nav-divider {
      width: 1px; height: 16px;
      background: var(--color-secondary);
      opacity: 0.35;
      display: inline-block;
    }

     
    #dark-toggle {
      background: none;
      border: 1px solid var(--color-border);
      border-radius: 4px;
      padding: 0.2rem 0.45rem;
      cursor: pointer;
      color: var(--color-secondary);
      font-size: 0.75rem;
      transition: border-color 0.15s, color 0.15s;
      line-height: 1.4;
    }
    #dark-toggle:hover { border-color: var(--color-link); color: var(--color-link); }

     
    .post-meta {
      font-size: 0.8rem;
      color: var(--color-secondary);
    }
    .post-tag {
      display: inline-block;
      padding: 0.1rem 0.45rem;
      border-radius: 3px;
      background: var(--color-surface-alt);
      border: 1px solid var(--color-border);
      font-size: 0.72rem;
      color: var(--color-secondary);
      text-decoration: none;
      transition: border-color 0.15s;
    }
    .post-tag:hover { border-color: var(--color-link); color: var(--color-link); text-decoration: none; }

     
    .post-row {
      display: grid;
      grid-template-columns: 7rem 1fr;
      gap: 0.5rem 1rem;
      padding: 0.55rem 0;
      border-bottom: 1px solid var(--color-border);
      align-items: baseline;
    }
    .post-row:last-child { border-bottom: none; }
    .post-row-date {
      font-size: 0.78rem;
      color: var(--color-muted);
      font-family: ui-monospace, Consolas, monospace;
      white-space: nowrap;
      padding-top: 0.1rem;
    }
    .post-row-title {
      font-weight: 500;
      color: var(--color-text);
      text-decoration: none;
      line-height: 1.4;
    }
    .post-row-title:hover { color: var(--color-link); text-decoration: underline dotted; text-decoration-color: var(--color-link-ul); }
    .post-row-desc {
      font-size: 0.8rem;
      color: var(--color-secondary);
      line-height: 1.4;
      margin-top: 0.15rem;
    }
    @media (max-width: 480px) {
      .post-row { grid-template-columns: 1fr; gap: 0.15rem; }
    }

     
    .portrait {
      float: left;
      margin: 0.2rem 1.5rem 1rem 0;
      border-radius: 50%;
      border: 2px solid var(--color-border);
    }
    @media (max-width: 480px) {
      .portrait { float: none; display: block; margin: 0 auto 1.25rem; }
    }

     
    #mobile-menu { display: none; }
    #mobile-menu.open { display: block; }

     
    .link-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.25rem 0;
    }
    .link-left {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      min-width: 0;
      flex: 1;
    }
    .link-favicon {
      width: 16px;
      height: 16px;
      margin-top: 0.2rem;
      flex-shrink: 0;
      border-radius: 2px;
    }
    .link-body { min-width: 0; }
    .link-title {
      font-weight: 500;
      font-size: 0.88rem;
      color: var(--color-link);
      text-decoration: none;
      line-height: 1.4;
    }
    .link-title:hover {
      text-decoration: underline dotted;
      text-decoration-color: var(--color-link-ul);
    }
    .link-title::after {
      content: ' ↗';
      font-size: 0.7em;
      opacity: 0.6;
    }
    .link-desc {
      font-size: 0.8rem;
      color: var(--color-secondary);
      line-height: 1.45;
      margin-top: 0.2rem;
    }
    .link-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.2rem;
      flex-shrink: 0;
      padding-top: 0.15rem;
    }
    .link-domain {
      font-size: 0.72rem;
      font-family: ui-monospace, 'SF Mono', Consolas, monospace;
      color: var(--color-muted);
      white-space: nowrap;
    }
    .link-date {
      font-size: 0.68rem;
      color: var(--color-muted);
      font-family: ui-monospace, 'SF Mono', Consolas, monospace;
      white-space: nowrap;
    }
    @media (max-width: 480px) {
      .link-right { display: none; }
    }

     
    .home-grid {
      display: grid;
      grid-template-columns: 1fr 260px;
      gap: 3rem;
      align-items: start;
    }
    @media (max-width: 768px) {
      .home-grid { grid-template-columns: 1fr; gap: 2rem; }
    }

     
    .sidebar-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      overflow: hidden;
      position: sticky;
      top: 3.5rem;
      font-size: 0.8rem;
    }
    .sidebar-header {
      padding: 0.6rem 0.85rem;
      border-bottom: 1px solid var(--color-border);
      font-family: ui-monospace, 'SF Mono', Consolas, monospace;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--color-prompt);
      letter-spacing: -0.01em;
    }
    .sidebar-body {
      padding: 0.75rem 0.85rem;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }
    .sidebar-section-title {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-muted);
      margin-bottom: 0.3rem;
    }
    .sidebar-link {
      display: block;
      color: var(--color-link);
      text-decoration: none;
      padding: 0.1rem 0;
      line-height: 1.5;
      transition: opacity 0.15s;
    }
    .sidebar-link:hover {
      opacity: 0.75;
      text-decoration: underline dotted;
      text-decoration-color: var(--color-link-ul);
    }

     
    .notes-layout {
      display: grid;
      grid-template-columns: 1fr 210px;
      gap: 3rem;
      align-items: start;
    }
    @media (max-width: 720px) {
      .notes-layout { grid-template-columns: 1fr; }
      .notes-cal-aside { display: none; }
    }

     
    .notes-cal-aside {
      position: sticky;
      top: 4rem;
    }
    .ncal-section-title {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-muted);
      margin-bottom: 0.75rem;
    }

     
    .ncal-heatmap {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px 2px;
      margin-bottom: 1.25rem;
    }
    .ncal-hm-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }
    .ncal-hm-circle {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      border: 1.5px solid var(--color-border);
      transition: transform 0.12s, box-shadow 0.12s;
      user-select: none;
    }
    .ncal-hm-cell.clickable { cursor: pointer; }
    .ncal-hm-cell.clickable:hover .ncal-hm-circle { transform: scale(1.12); }
     
    .ncal-hm-circle.lv0 { border-style: dashed; color: var(--color-muted); background: transparent; }
     
    .ncal-hm-circle.lv1 { background: #f0d5c8; border-color: #e0b8a0; color: #7a3820; }
     
    .ncal-hm-circle.lv2 { background: #d4896a; border-color: #c07050; color: #fff; }
     
    .ncal-hm-circle.lv3 { background: #b85c38; border-color: #9e4c2c; color: #fff; }
     
    .ncal-hm-circle.lv4 { background: #7a3018; border-color: #5e2010; color: #ffe0d0; }
    .ncal-hm-circle.future { border-style: dotted; color: var(--color-muted); background: transparent; }
    .ncal-hm-circle.selected { box-shadow: 0 0 0 2px var(--color-link); }
    .ncal-hm-label {
      font-size: 8px;
      color: var(--color-muted);
      font-family: ui-monospace, 'SF Mono', Consolas, monospace;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

     
    .dark .ncal-hm-circle.lv1 { background: #5a2810; border-color: #7a3820; color: #f0c8a8; }

     
    .ncal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }
    .ncal-nav-label {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--color-secondary);
      font-family: ui-monospace, 'SF Mono', Consolas, monospace;
    }
    .ncal-nav button {
      background: none;
      border: 1px solid var(--color-border);
      border-radius: 3px;
      cursor: pointer;
      color: var(--color-secondary);
      font-size: 0.8rem;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.12s, border-color 0.12s;
      line-height: 1;
    }
    .ncal-nav button:hover { color: var(--color-link); border-color: var(--color-link); }

     
    .ncal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      text-align: center;
    }
    .ncal-day-hdr {
      font-size: 8px;
      color: var(--color-muted);
      font-family: ui-monospace, 'SF Mono', Consolas, monospace;
      text-transform: uppercase;
      padding-bottom: 3px;
    }
    .ncal-day {
      font-size: 10px;
      padding: 3px 1px;
      border-radius: 3px;
      color: var(--color-muted);
      line-height: 1.4;
    }
    .ncal-day.active {
      color: var(--color-link);
      font-weight: 700;
      background: var(--color-surface);
      cursor: pointer;
    }
    .ncal-day.active:hover {
      background: var(--color-surface-alt);
    }

     
    .cv-prose p { margin-top: 0.2rem; margin-bottom: 0.2rem; }
    .cv-prose ul { margin-top: 0.25rem; margin-bottom: 0.25rem; }
    .cv-prose li { margin-top: 0; margin-bottom: 0; }
    .cv-prose h2 { margin-top: 1.25rem; }
    .cv-prose h2:first-child { margin-top: 0; }
    .cv-prose hr { margin-top: 0.75rem; margin-bottom: 0; }
    .cv-prose em { color: var(--color-secondary); }

     
     
    .dark .prose {
      color: #c0ccd8;
    }
    .dark .prose h1,
    .dark .prose h2,
    .dark .prose h3,
    .dark .prose h4,
    .dark .prose h5,
    .dark .prose h6 {
      color: #d5dfe8;
    }
    .dark .prose strong {
      color: #d5dfe8;
    }
    .dark .prose li::marker {
      color: #6e7681;
    }
    .dark .prose a,
    .prose a {
      color: var(--color-link);
      text-decoration-color: var(--color-link-ul);
    }
    .dark .prose a:hover,
    .prose a:hover {
      text-decoration-color: var(--color-link);
    }
    .dark .prose hr {
      border-color: var(--color-border);
    }
  </style>

  
  <script>
    (function() {
      var stored = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (stored === 'dark' || (!stored && prefersDark)) {
        document.documentElement.classList.add('dark');
        document.getElementById('meta-theme-color').content = '#0d1117';
      }
    })();
  </script>
</head>

  (function() {
    var btn = document.getElementById('dark-toggle');
    var icon = document.getElementById('dark-toggle-icon');
    var html = document.documentElement;

    function updateIcon() {
      icon.textContent = html.classList.contains('dark') ? '◑' : '◐';
    }
    updateIcon();

    btn.addEventListener('click', function() {
      var isDark = html.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      document.getElementById('meta-theme-color').content = isDark ? '#0d1117' : '#fffffc';
      
      document.getElementById('hljs-light').disabled = isDark;
      document.getElementById('hljs-dark').disabled  = !isDark;
      updateIcon();
    });

    
    if (html.classList.contains('dark')) {
      document.getElementById('hljs-light').disabled = true;
      document.getElementById('hljs-dark').disabled  = false;
    }
  })();

  
  document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('pre code').forEach(function(block) {
      hljs.highlightElement(block);
    });
  });
</script>

  <div class="notes-layout">

    
    <div>
      <div class="flex items-baseline justify-between mb-2">
        <h1 class="text-xl font-bold" style="color:var(--color-text);">Notes</h1>
        <span class="text-xs" style="color:var(--color-muted);">
          0 notes
        </span>

        Short notes, thoughts, and updates.
      </p>

      <div id="notes-calendar"
           data-dates='[]'
           data-current="2026-04">
        <div class="ncal-section-title">Activity</div>
        <div id="ncal-heatmap" class="ncal-heatmap"></div>
        <div class="ncal-nav">
          <button id="ncal-prev" aria-label="Previous month">‹</button>
          <span id="ncal-label" class="ncal-nav-label"></span>
          <button id="ncal-next" aria-label="Next month">›</button>
        </div>
        <div id="ncal-grid" class="ncal-grid"></div>
      </div>
    </aside>

<script>
(function () {
  var container = document.getElementById('notes-calendar');
  if (!container) return;

  
  var monthsData = {};
  JSON.parse(container.dataset.dates || '[]').forEach(function (dateStr) {
    var parts = dateStr.split('-');
    var ym  = parts[0] + '-' + parts[1];
    var day = parseInt(parts[2], 10);
    if (!monthsData[ym]) monthsData[ym] = [];
    monthsData[ym].push(day);
  });

  var currentMonth = container.dataset.current; 

  var MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var DOW = ['Mo','Tu','We','Th','Fr','Sa','Su'];

  function parseYM(ym) {
    var parts = ym.split('-');
    return { year: parseInt(parts[0], 10), month: parseInt(parts[1], 10) };
  }
  function toYM(year, month) {
    return year + '-' + (month < 10 ? '0' : '') + month;
  }
  function daysInMonth(year, month) {
    return new Date(year, month, 0).getDate();
  }
  function level(n) {
    if (!n) return 0;
    if (n <= 2) return 1;
    if (n <= 5) return 2;
    if (n <= 10) return 3;
    return 4;
  }

   
  function renderHeatmap() {
    var hm = document.getElementById('ncal-heatmap');
    hm.innerHTML = '';

    var today = new Date();
    var year = today.getFullYear();

    
    var months = [];
    for (var i = 1; i <= 12; i++) {
      months.push({ year: year, month: i });
    }

    months.forEach(function (mo) {
      var ym = toYM(mo.year, mo.month);
      var days = monthsData[ym] || [];
      var count = days.length;
      var lv = level(count);
      var isFuture = new Date(mo.year, mo.month - 1) > today;
      var isSelected = ym === currentMonth;

      var cell = document.createElement('div');
      cell.className = 'ncal-hm-cell' + (isFuture ? '' : ' clickable');

      var circle = document.createElement('div');
      var circleClass = 'ncal-hm-circle lv' + lv;
      if (isFuture) circleClass += ' future';
      if (isSelected) circleClass += ' selected';
      circle.className = circleClass;
      circle.title = MON[mo.month - 1] + ' ' + mo.year + ': ' + count + ' note' + (count !== 1 ? 's' : '');

      var cnt = document.createElement('span');
      cnt.textContent = count > 0 ? count : (isFuture ? '·' : '–');
      circle.appendChild(cnt);

      var lbl = document.createElement('span');
      lbl.className = 'ncal-hm-label';
      lbl.textContent = MON[mo.month - 1];

      if (!isFuture) {
        cell.addEventListener('click', function (capturedYm) {
          return function () {
            currentMonth = capturedYm;
            renderHeatmap();
            renderCalendar();
            scrollToMonth(capturedYm);
          };
        }(ym));
      }

      cell.appendChild(circle);
      cell.appendChild(lbl);
      hm.appendChild(cell);
    });
  }

   
  function renderCalendar() {
    var lbl = document.getElementById('ncal-label');
    var grid = document.getElementById('ncal-grid');
    grid.innerHTML = '';

    var p = parseYM(currentMonth);
    lbl.textContent = MON[p.month - 1] + ' ' + p.year;

    
    DOW.forEach(function (d) {
      var h = document.createElement('div');
      h.className = 'ncal-day-hdr';
      h.textContent = d;
      grid.appendChild(h);
    });

    
    var firstDay = new Date(p.year, p.month - 1, 1).getDay(); 
    var offset = (firstDay + 6) % 7;
    for (var i = 0; i < offset; i++) {
      grid.appendChild(document.createElement('div'));
    }

    var total = daysInMonth(p.year, p.month);
    var activeDays = {};
    (monthsData[currentMonth] || []).forEach(function (d) { activeDays[d] = true; });

    for (var d = 1; d <= total; d++) {
      var cell = document.createElement('div');
      cell.className = 'ncal-day' + (activeDays[d] ? ' active' : '');
      cell.textContent = d;

      if (activeDays[d]) {
        var dateStr = p.year + '-' +
          (p.month < 10 ? '0' : '') + p.month + '-' +
          (d < 10 ? '0' : '') + d;
        cell.addEventListener('click', function (ds) {
          return function () {
            var el = document.getElementById('note-' + ds);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
          };
        }(dateStr));
      }
      grid.appendChild(cell);
    }
  }

   
  function scrollToMonth(ym) {
    var el = document.querySelector('[data-note-ym="' + ym + '"]');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

   
  document.getElementById('ncal-prev').addEventListener('click', function () {
    var p = parseYM(currentMonth);
    currentMonth = p.month === 1 ? toYM(p.year - 1, 12) : toYM(p.year, p.month - 1);
    renderHeatmap();
    renderCalendar();
  });
  document.getElementById('ncal-next').addEventListener('click', function () {
    var p = parseYM(currentMonth);
    currentMonth = p.month === 12 ? toYM(p.year + 1, 1) : toYM(p.year, p.month + 1);
    renderHeatmap();
    renderCalendar();
  });

   
  if ('IntersectionObserver' in window) {
    var observer = new IntersectionObserver(function (entries) {
      entries.forEach(function (e) {
        if (e.isIntersecting) {
          var ym = e.target.dataset.noteYm;
          if (ym && ym !== currentMonth) {
            currentMonth = ym;
            renderCalendar();
            renderHeatmap();
          }
        }
      });
    }, { threshold: 0.6 });

    document.querySelectorAll('.note-row').forEach(function (el) {
      observer.observe(el);
    });
  }

  renderHeatmap();
  renderCalendar();
})();
</script>
